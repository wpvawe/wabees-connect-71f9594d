name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint
        continue-on-error: true

      - name: Typecheck
        run: bunx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: bun run build
        env:
          # Publishable (anon) values — safe to commit; browser dekh hi leta hai
          VITE_SUPABASE_URL: https://yksgsxmssnlmoijcwmkr.supabase.co
          VITE_SUPABASE_PROJECT_ID: yksgsxmssnlmoijcwmkr
          VITE_SUPABASE_PUBLISHABLE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inlrc2dzeG1zc25sbW9pamN3bWtyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI0ODA3ODIsImV4cCI6MjA5ODA1Njc4Mn0.n6Q_l51nmA9tgFIxuxAn5-G4GWk1G3g3h9KSDB1z1aA

      - name: Upload build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist
          retention-days: 7